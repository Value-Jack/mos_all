<script src="https://assets.crowd.aws/crowd-html-elements.js"></script>
<crowd-form answer-format="flatten-objects">
  <div style="font-family: Arial, Helvetica, sans-serif; max-width: 1180px; margin: 0 auto;">
    <p style="font-weight: 700; color: #b3261e;">
      Complete the evaluation inside the frame. Use the Submit HIT button inside the evaluation page when finished.
    </p>
    <iframe
      id="mosFrame"
      title="MOS evaluation"
      src="https://value-jack.github.io/mos_all/cv_grpo/mos_20_m10_f10_ordered_0714/mos_external.html?cases=${cases}&submitMode=postMessage"
      style="width: 100%; height: 900px; border: 1px solid #d7d9dd; border-radius: 8px;"
      allow="autoplay">
    </iframe>
    <div id="mosAnswers"></div>
    <p id="mosStatus" style="font-weight: 700;"></p>
    <button id="hiddenSubmit" type="submit" style="display: none;">Submit</button>
  </div>
</crowd-form>
<script>
  (function () {
    const answersHolder = document.getElementById('mosAnswers');
    const status = document.getElementById('mosStatus');
    const submitButton = document.getElementById('hiddenSubmit');

    function addHiddenInput(name, value) {
      const input = document.createElement('input');
      input.type = 'hidden';
      input.name = name;
      input.value = value == null ? '' : String(value);
      answersHolder.appendChild(input);
    }

    window.addEventListener('message', function (event) {
      if (event.origin !== 'https://value-jack.github.io') return;
      if (!event.data || event.data.type !== 'mos-submit') return;
      answersHolder.innerHTML = '';
      Object.keys(event.data.answers).forEach(function (key) {
        addHiddenInput(key, event.data.answers[key]);
      });
      addHiddenInput('submitted_via', 'mos_external_postMessage');
      status.textContent = 'Submitting your answers to MTurk...';
      submitButton.click();
    });
  })();
</script>
